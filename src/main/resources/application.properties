spring.application.name                   =AirlineReservationSystem
spring.devtools.restart.enabled           =true
spring.devtools.livereload.enabled        =true

# Thymeleaf view resolver
spring.thymeleaf.prefix                   =classpath:/templates/
spring.thymeleaf.suffix                   =.html
spring.thymeleaf.cache                    =false
spring.thymeleaf.mode                     =HTML

# MySQL Database Connection
spring.datasource.driver-class-name       =com.mysql.cj.jdbc.Driver
spring.datasource.url                     =${AIRLINE_DB_URL:jdbc:mysql://localhost:3306/airline_db?createDatabaseIfNotExist=true}
spring.datasource.username                =${AIRLINE_DB_USERNAME:root}
spring.datasource.password                =${AIRLINE_DB_PASSWORD:root}

# Flyway
spring.flyway.enabled                     =true
spring.flyway.baseline-on-migrate         =true
spring.flyway.clean-disabled              =true

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto             =none
spring.jpa.show-sql                       =true
spring.jpa.properties.hibernate.dialect   =org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl                   =false

# Pricing configuration
pricing.tax-rate                          =0.10
pricing.service-fee                       =50
