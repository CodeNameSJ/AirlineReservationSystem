<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:replace="~{layout :: page('User Registration', ~{::content}, ~{::scripts})}">
<th:block th:fragment="content">
	<section class="page-shell">
		<div class="section-intro">
			<span class="eyebrow">Create Account</span>
			<h1>Join the cabin</h1>
			<p class="section-lead">Create your account once and manage every route, booking, and confirmation from a calmer control surface.</p>
		</div>
		<div class="login-box">
			<p>Sign Up</p>
			<form th:action="@{/register}" method="post" th:object="${user}">
				<div class="user-box">
					<input required type="text" id="username" name="username" th:value="*{username}">
					<label for="username">Username</label>
				</div>
				<div class="user-box">
					<input required type="email" id="email" name="email" th:value="*{email}">
					<label for="email">Email</label>
				</div>
				<div class="user-box">
					<input required type="password" id="password" name="password">
					<label for="password">Password</label>
				</div>
				<button type="submit" class="animated-button">
					Register
				</button>
			</form>
			<p>Already have an account?
				<a th:href="@{/login}" class="a2">Login</a>
			</p>
			<p th:if="${error}" th:text="${error}" style="color:red" class="a2"></p>
		</div>
	</section>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
