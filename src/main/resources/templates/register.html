<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: page('User Registration', ~{::content}, ~{::scripts})}"
      xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="content">
	<section class="page-shell">
		<div class="section-intro">
			<span class="eyebrow">Create Account</span>
			<h1>Join the cabin</h1>
			<p class="section-lead">Create your account once and manage every route, booking, and confirmation from a
			                        calmer control surface.</p>
		</div>
		<div class="login-box">
			<p>Sign Up</p>
			<form method="post" th:action="@{/register}" th:object="${user}">

				<div class="user-box">
					<label for="username">Username</label>
					<input id="username" required th:field="*{username}" type="text">
					<span class="error" th:errors="*{username}" th:if="${#fields.hasErrors('username')}"></span>
				</div>

				<div class="user-box">
					<label for="email">Email</label>
					<input id="email" required th:field="*{email}" type="email">
					<span class="error" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></span>
				</div>

				<div class="user-box">
					<label for="password">Password</label>
					<input id="password" required th:field="*{password}" type="password">
					<span class="error" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></span>
				</div>

				<button class="animated-button" type="submit">Register</button>

			</form>
			
			<p>Already have an account?
				<a class="a2" th:href="@{/login}">Login</a>
			</p>
			<p class="a2" style="color:red" th:if="${error}" th:text="${error}"></p>
		</div>
	</section>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
