<!DOCTYPE html>
<html lang="en"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Search Flights</title>
	<th:block layout:fragment="head">
		<meta charset="utf-8"/>
	</th:block>
</head>
<body>
<div layout:fragment="content">
	<h1 class="page-title">Search Flights</h1>
	<div th:replace="~{fragments/searchForm :: searchForm}"></div>
	<hr/>
	<div id="searchResults">
		<table class="booking-table">
			<thead>
			<tr>
				<th>Flight No</th>
				<th>Origin</th>
				<th>Destination</th>
				<th>Departure</th>
				<th>Arrival</th>
				<th>Price (Economy)</th>
				<th>Price (Business)</th>
				<th>Action</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="flight : ${flights}">
				<td th:text="${flight.flightNumber}"></td>
				<td th:text="${flight.origin}"></td>
				<td th:text="${flight.destination}"></td>
				<td th:text="${flight.departureDisplay}"></td>
				<td th:text="${flight.arrivalDisplay}"></td>
				<td th:text="${flight.priceEconomy}"></td>
				<td th:text="${flight.priceBusiness}"></td>
				<td>
					<a th:href="@{/flight/{id}(id=${flight.id})}" th:if="${session.userId != null}" class="button">Book</a>
					<a th:href="@{/login}" th:unless="${session.userId != null}" class="button">Login to Book</a>
				</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
