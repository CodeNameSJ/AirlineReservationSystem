<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: page('User Details', ~{::content}, ~{::scripts})}"
      xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="content">
	<h2 th:text="${user.id != null} ? 'Edit User' : 'Add User'"></h2>

	<form method="post" th:action="@{/admin/users/save}" th:object="${user}">
		<input name="id" th:field="*{id}" type="hidden"/>

		<label>Username:
			<input name="username" required th:value="${user.username}" type="text"/>
		</label><br/>

		<label>Email:
			<input name="email" required th:value="${user.email}" type="email"/>
		</label><br/>

		<label>Password:
			<input placeholder="Leave blank to keep current password" th:field="*{password}" type="password">
		</label><br/>

		<label>Role:
			<select name="role">
				<option th:each="role : ${roles}"
				        th:selected="${role} == ${user.role}"
				        th:text="${role}"
				        th:value="${role}">
				</option>
			</select>
		</label><br/>
		<button type="submit">Save</button>
		<a class="button" th:href="@{/admin/users}">Cancel</a>
	</form>
</th:block>

<th:block th:fragment="scripts">
	<script defer th:src="@{/js/confirmation.js}"></script>
</th:block>
</html>
