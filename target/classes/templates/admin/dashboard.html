<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Admin Dashboard', ~{::content}, ~{::scripts})}">
<th:block th:fragment="content">
	<section class="page-shell">
		<div class="section-intro">
			<span class="eyebrow">Operations</span>
			<h2>Admin Dashboard</h2>
			<p class="section-lead">A focused overview of route inventory and timetable readiness across the current flight set.</p>
		</div>
		<div class="table-panel">
			<h3>All Flights Overview</h3>
			<table class="booking-table">
		<thead>
		<tr>
			<th>Flight No</th>
			<th>Origin</th>
			<th>Destination</th>
			<th>Departure</th>
			<th>Arrival</th>
			<th>Economy Seats</th>
			<th>Business Seats</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="flight : ${flights}">
			<td th:text="${flight.flightNumber}"></td>
			<td th:text="${flight.origin}"></td>
			<td th:text="${flight.destination}"></td>
			<td th:text="${flight.departureDisplay}"></td>
			<td th:text="${flight.arrivalDisplay}"></td>
			<td th:text="${flight.economySeatsAvailable} + '/' + ${flight.totalEconomySeats}"></td>
			<td th:text="${flight.businessSeatsAvailable} + '/' + ${flight.totalBusinessSeats}"></td>
		</tr>
		</tbody>
			</table>
		</div>
	</section>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
