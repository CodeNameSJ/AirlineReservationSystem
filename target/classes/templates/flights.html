<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Search Flights', ~{::content}, ~{::scripts})}">
<th:block th:fragment="content">
	<section class="page-shell">
		<div class="section-intro">
			<span class="eyebrow">Search Results</span>
			<h1 class="page-title">Search Flights</h1>
			<p class="section-lead">View route availability, compare cabin pricing, and continue directly to booking.</p>
		</div>

		<div th:replace="~{fragments/searchForm :: searchForm}"></div>

		<div id="searchResults" class="table-panel">
			<table class="booking-table">
			<thead>
			<tr>
				<th>Flight No</th>
				<th>Origin</th>
				<th>Destination</th>
				<th>Departure</th>
				<th>Arrival</th>
				<th>Price (Economy)</th>
				<th>Price (Business)</th>
				<th>Action</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="flight : ${flights}">
				<td th:text="${flight.flightNumber}"></td>
				<td th:text="${flight.origin}"></td>
				<td th:text="${flight.destination}"></td>
				<td th:text="${flight.departureDisplay}"></td>
				<td th:text="${flight.arrivalDisplay}"></td>
				<td th:text="${flight.priceEconomy}"></td>
				<td th:text="${flight.priceBusiness}"></td>
				<td>
						<button class="button"
						        th:if="${session.userId != null}"
						        th:onclick="|window.location.href='@{/flight/{id}(id=${flight.id})}'|"
						        type="button">
							Book
						</button>
						<button class="button"
						        th:unless="${session.userId != null}"
						        th:onclick="|window.location.href='@{/login}'|"
						        type="button">
							Login to Book
						</button>
				</td>
			</tr>
			</tbody>
			</table>
		</div>
	</section>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
