<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:replace="~{layout :: page('Login', ~{::content}, ~{::scripts})}">
<th:block th:fragment="content">
	<section class="page-shell">
		<div class="section-intro">
			<span class="eyebrow">Secure Access</span>
			<h1>Welcome back</h1>
			<p class="section-lead">Enter your credentials to view bookings and continue using the system.</p>
		</div>
		<div class="login-box">
			<p>Login</p>
			<form th:action="@{/login}" method="post">
				<div class="user-box">
					<input required type="text" id="username" name="username" autocomplete="on">
					<label for="username">Username</label>
				</div>
				<div class="user-box">
					<input required type="password" id="password" name="password">
					<label for="password">Password</label>
				</div>
				<button type="submit" class="animated-button">
					Login
				</button>
			</form>
			<p>Don't have an account?
				<a th:href="@{/register}" class="a2">Signup</a>
			</p>
			<p class="a2 form-error" th:if="${error}" th:text="${error}"></p>
		</div>
	</section>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
