<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:fragment="page(pageTitle, pageContent, pageScripts)">
<head>
	<meta charset="utf-8"/>
	<title th:text="${pageTitle} ?: 'Admin - Airline Reservation'">Admin</title>

	<th:block th:replace="~{fragments/themeHead :: themeHead}"></th:block>

	<link rel="stylesheet" th:href="@{/css/theme.css}"/>
	<link rel="stylesheet" th:href="@{/css/theme-sync.css}"/>
	<link rel="stylesheet" th:href="@{/css/base.css}"/>
	<link rel="stylesheet" th:href="@{/css/navbar.css}"/>
	<link rel="stylesheet" th:href="@{/css/search.css}"/>
	<link rel="stylesheet" th:href="@{/css/forms.css}"/>
	<link rel="stylesheet" th:href="@{/css/components.css}"/>
	<link rel="stylesheet" th:href="@{/css/card.css}"/>
	<link rel="stylesheet" th:href="@{/css/buttons.css}"/>
	<link rel="stylesheet" th:href="@{/css/booking.css}"/>
	<link rel="stylesheet" th:href="@{/css/theme-toggle.css}"/>

	<link rel="icon" type="image/png" th:href="@{/images/admin-favicon.png}">
</head>
<body>
<header>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main>
	<div aria-live="polite" class="flash-stack" th:if="${successMessage != null or errorMessage != null}" role="status">
		<div class="flash-message success" th:if="${successMessage != null}" th:text="${successMessage}">Action completed successfully.</div>
		<div class="flash-message error" th:if="${errorMessage != null}" th:text="${errorMessage}">Something went wrong.</div>
	</div>
	<th:block th:replace="${pageContent}"></th:block>
</main>

<footer class="site-footer">
	<div th:replace="~{fragments/footer :: footer}"></div>
</footer>

<script th:src="@{/js/search.js}" defer></script>
<script th:src="@{/js/navbar.js}" defer></script>
<script th:src="@{/js/confirmation.js}" defer></script>
<script th:src="@{/js/theme-toggle.js}" defer></script>

<div th:replace="~{fragments/themeToggle :: themeToggle}"></div>
<th:block th:replace="${pageScripts}"></th:block>
</body>
</html>
